<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <h1>Sign in</h1>
                <p>Access your scan history and save future scans to your account.</p>
            </div>
            <a href="{{ url_for('home') }}">Back to home</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-stack">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="card">
            <form method="post">
                <div>
                    <label for="identifier">Email or username</label>
                    <input id="identifier" name="identifier" type="text" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter your password" required>
                </div>
                <button type="submit">Sign in</button>
            </form>
            <div class="meta">No account yet? <a href="{{ url_for('signup') }}">Create one here</a>.</div>
        </div>
    </div>
</body>
</html>
